<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAFKA WARS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #070b0f;
            color: #c0ffc0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 0.3em;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #ff00ff;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            margin-bottom: 28px;
            text-shadow: 0 0 10px #ff00ff;
        }

        /* ─── LOBBY SCREEN ─────────────────────────────── */
        #lobby-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        #lobby-screen input {
            background: #0d1a0d;
            border: 1px solid #00ff88;
            color: #00ff88;
            font-family: inherit;
            font-size: 1.1rem;
            padding: 10px 18px;
            width: 280px;
            outline: none;
            box-shadow: 0 0 8px #00ff8844;
        }

        #lobby-screen input:focus {
            box-shadow: 0 0 16px #00ff8888;
        }

        .btn {
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
            font-family: inherit;
            font-size: 1rem;
            padding: 10px 32px;
            cursor: pointer;
            letter-spacing: 0.15em;
            transition: all 0.15s;
        }

        .btn:hover {
            background: #00ff8822;
            box-shadow: 0 0 16px #00ff8866;
        }

        #lobby-status {
            color: #ff00ff;
            font-size: 0.85rem;
            text-shadow: 0 0 8px #ff00ff;
        }

        .waiting-dot {
            display: inline-block;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

        /* ─── GAME SCREEN ──────────────────────────────── */
        #game-screen {
            display: none;
            flex-direction: row;
            gap: 24px;
            align-items: flex-start;
        }

        #canvas-wrapper {
            position: relative;
        }

        #game-canvas {
            display: block;
            border: 2px solid #00ff88;
            box-shadow: 0 0 30px #00ff8844, inset 0 0 20px #00000088;
            image-rendering: pixelated;
        }

        /* ─── SIDEBAR ──────────────────────────────────── */
        #sidebar {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .panel {
            border: 1px solid #00ff8844;
            padding: 12px;
            background: #0a110a;
        }

        .panel-title {
            color: #ff00ff;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .player-entry {
            font-size: 0.8rem;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .hp-bar-outer {
            flex: 1;
            height: 8px;
            background: #1a1a1a;
            border: 1px solid #333;
        }

        .hp-bar-inner {
            height: 100%;
            transition: width 0.2s;
        }

        .controls-info {
            font-size: 0.7rem;
            color: #667766;
            line-height: 1.8;
        }

        .controls-info span { color: #00ff88; }

        #match-id-display {
            font-size: 0.65rem;
            color: #445544;
            word-break: break-all;
        }

        /* ─── VICTORY OVERLAY ──────────────────────────── */
        #victory-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000000cc;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }

        #victory-overlay.show { display: flex; }

        #victory-text {
            font-size: 2.5rem;
            letter-spacing: 0.2em;
            text-shadow: 0 0 40px currentColor;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.7;} }

        @keyframes hitFlash {
            0%   { background: rgba(255,0,0,0.7); }
            100% { background: transparent; }
        }

        .hit-flash {
            animation: hitFlash 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <h1>⚡ KAFKA WARS ⚡</h1>
    <div class="subtitle">DISTRIBUTED BATTLEFIELD v2.0</div>

    <!-- Lobby Screen -->
    <div id="lobby-screen">
        <input id="player-name-input" type="text" placeholder="Enter callsign..." maxlength="20" />
        <button class="btn" onclick="joinLobby()">[ JOIN BATTLE ]</button>
        <div id="lobby-status">Enter your callsign to begin</div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen">
        <div id="canvas-wrapper">
            <canvas id="game-canvas" width="600" height="600"></canvas>
        </div>

        <div id="sidebar">
            <div class="panel">
                <div class="panel-title">COMBATANTS</div>
                <div id="players-list"></div>
            </div>

            <div class="panel">
                <div class="panel-title">CONTROLS</div>
                <div class="controls-info">
                    <span>W A S D</span> — Move<br>
                    <span>I</span> — Fire UP<br>
                    <span>K</span> — Fire DOWN<br>
                    <span>J</span> — Fire LEFT<br>
                    <span>L</span> — Fire RIGHT
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">MATCH</div>
                <div id="match-id-display">—</div>
            </div>
        </div>
    </div>

    <!-- Victory Overlay -->
    <div id="victory-overlay">
        <div id="victory-text">VICTORY</div>
        <button class="btn" onclick="location.reload()">[ PLAY AGAIN ]</button>
    </div>

    <script>
    // ─── Config ────────────────────────────────────────────────────────
    const CELL  = 30;
    const GRID  = 20;
    const PLAYER_COLORS = ['#00ff88', '#ff4444', '#ffee00', '#4488ff'];
    const MAX_HP = 5;

    // ─── State ─────────────────────────────────────────────────────────
    let myPlayerId  = null;
    let myUnitId    = null;
    let currentMatchId = null;
    let gameState   = null;
    let ws          = null;
    let playerColorMap = {};   // playerId → color
    let hitEffects  = [];      // [{x, y, startTime}]
    let projectiles = [];      // [{startX,startY,endX,endY,color,startTime,duration}]
    let animFrame   = null;

    const canvas  = document.getElementById('game-canvas');
    const ctx     = canvas.getContext('2d');

    // ─── Lobby ─────────────────────────────────────────────────────────
    async function joinLobby() {
        const input = document.getElementById('player-name-input');
        const name  = input.value.trim();
        if (!name) { setLobbyStatus('Enter a callsign first!'); return; }

        myPlayerId = name;
        setLobbyStatus('Connecting to battle grid<span class="waiting-dot">...</span>');

        try {
            const resp = await fetch('/api/v1/lobby/join', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ playerId: myPlayerId })
            });
            const lobby = await resp.json();
            currentMatchId = lobby.matchId;

            if (lobby.status === 'ACTIVE') {
                startGame(lobby.matchId);
            } else {
                setLobbyStatus(`Waiting for opponents<span class="waiting-dot">...</span><br>Match: ${lobby.matchId}`);
                pollLobby(lobby.matchId);
            }
        } catch (e) {
            setLobbyStatus('Connection error. Is the server running?');
        }
    }

    function setLobbyStatus(html) {
        document.getElementById('lobby-status').innerHTML = html;
    }

    async function pollLobby(matchId) {
        const poll = async () => {
            try {
                const resp = await fetch(`/api/v1/state/${matchId}`);
                if (resp.ok) {
                    const state = await resp.json();
                    if (state.status === 'ACTIVE') {
                        startGame(matchId);
                        return;
                    }
                }
            } catch (_) {}
            setTimeout(poll, 1000);
        };
        poll();
    }

    // ─── Game Start ────────────────────────────────────────────────────
    function startGame(matchId) {
        currentMatchId = matchId;
        document.getElementById('lobby-screen').style.display = 'none';
        document.getElementById('game-screen').style.display  = 'flex';
        document.getElementById('match-id-display').textContent = matchId;

        connectWebSocket(matchId);
        fetchAndRender();   // immediate render while WS connects
        animFrame = requestAnimationFrame(renderLoop);
    }

    // ─── WebSocket ─────────────────────────────────────────────────────
    function connectWebSocket(matchId) {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws/game`);

        ws.onopen = () => {
            ws.send(JSON.stringify({ matchId }));
        };

        ws.onmessage = (ev) => {
            const state = JSON.parse(ev.data);
            applyState(state);
        };

        ws.onclose = () => {
            // Reconnect after 2s if game still active
            if (gameState && gameState.status !== 'FINISHED') {
                setTimeout(() => connectWebSocket(matchId), 2000);
            }
        };
    }

    // ─── State Application ─────────────────────────────────────────────
    function applyState(newState) {
        // Detect hits: units that lost HP
        if (gameState) {
            for (const [uid, unit] of Object.entries(newState.units || {})) {
                const prev = gameState.units[uid];
                if (prev && unit.hp < prev.hp) {
                    hitEffects.push({ x: unit.position.x, y: unit.position.y, startTime: performance.now() });
                }
            }
        }

        gameState = newState;

        // Assign colors to new players
        for (const [uid, unit] of Object.entries(newState.units || {})) {
            if (!playerColorMap[unit.playerId]) {
                const idx = Object.keys(playerColorMap).length;
                playerColorMap[unit.playerId] = PLAYER_COLORS[idx % PLAYER_COLORS.length];
            }
            if (unit.playerId === myPlayerId) myUnitId = uid;
        }

        updateSidebar(newState);

        if (newState.status === 'FINISHED') {
            showVictory(newState.winnerId);
        }
    }

    async function fetchAndRender() {
        try {
            const resp = await fetch(`/api/v1/state/${currentMatchId}`);
            if (resp.ok) applyState(await resp.json());
        } catch (_) {}
    }

    // ─── Render Loop ───────────────────────────────────────────────────
    function renderLoop(now) {
        if (!gameState) { animFrame = requestAnimationFrame(renderLoop); return; }

        ctx.clearRect(0, 0, 600, 600);
        drawGrid();
        drawHitEffects(now);
        drawProjectiles(now);
        drawUnits();

        animFrame = requestAnimationFrame(renderLoop);
    }

    function drawGrid() {
        ctx.strokeStyle = '#0d1f0d';
        ctx.lineWidth   = 0.5;
        for (let i = 0; i <= GRID; i++) {
            ctx.beginPath();
            ctx.moveTo(i * CELL, 0);
            ctx.lineTo(i * CELL, 600);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0,   i * CELL);
            ctx.lineTo(600, i * CELL);
            ctx.stroke();
        }
    }

    // ─── Projectiles ───────────────────────────────────────────────────
    function addProjectile(fromX, fromY, direction, color) {
        let dx = 0, dy = 0;
        switch (direction) {
            case 'UP':    dy = -1; break;
            case 'DOWN':  dy =  1; break;
            case 'LEFT':  dx = -1; break;
            case 'RIGHT': dx =  1; break;
            default: return;
        }

        // Trace path: stop at first unit or grid edge
        let cx = fromX, cy = fromY, maxDist = 0;
        while (true) {
            cx += dx; cy += dy;
            if (cx < 0 || cx >= GRID || cy < 0 || cy >= GRID) break;
            maxDist++;
            if (gameState) {
                const blocked = Object.values(gameState.units).some(
                    u => u.position.x === cx && u.position.y === cy);
                if (blocked) break;
            }
        }
        if (maxDist === 0) return;

        projectiles.push({
            startX: fromX, startY: fromY,
            endX: fromX + dx * maxDist, endY: fromY + dy * maxDist,
            color, startTime: performance.now(),
            duration: Math.max(150, maxDist * 70)   // ~70ms per cell
        });
    }

    function drawProjectiles(now) {
        projectiles = projectiles.filter(p => now - p.startTime < p.duration);
        for (const p of projectiles) {
            const t  = (now - p.startTime) / p.duration;
            const px = (p.startX + (p.endX - p.startX) * t) * CELL + CELL / 2;
            const py = (p.startY + (p.endY - p.startY) * t) * CELL + CELL / 2;

            ctx.save();
            // Outer glow
            ctx.shadowColor = p.color;
            ctx.shadowBlur  = 14;
            ctx.fillStyle   = p.color;
            ctx.globalAlpha = 0.55;
            ctx.beginPath();
            ctx.arc(px, py, 6, 0, Math.PI * 2);
            ctx.fill();
            // Bright core
            ctx.shadowBlur  = 6;
            ctx.fillStyle   = '#ffffff';
            ctx.globalAlpha = 1;
            ctx.beginPath();
            ctx.arc(px, py, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function drawHitEffects(now) {
        hitEffects = hitEffects.filter(e => now - e.startTime < 400);
        for (const e of hitEffects) {
            const alpha = 1 - (now - e.startTime) / 400;
            ctx.fillStyle = `rgba(255, 40, 40, ${alpha * 0.75})`;
            ctx.fillRect(e.x * CELL, e.y * CELL, CELL, CELL);
        }
    }

    function drawUnits() {
        if (!gameState || !gameState.units) return;

        for (const [uid, unit] of Object.entries(gameState.units)) {
            const color   = playerColorMap[unit.playerId] || '#ffffff';
            const px      = unit.position.x * CELL;
            const py      = unit.position.y * CELL;
            const isMe    = unit.playerId === myPlayerId;

            // Cell background
            ctx.fillStyle = isMe ? color + '22' : color + '11';
            ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);

            // Unit circle
            const cx = px + CELL / 2;
            const cy = py + CELL / 2 + 4;
            const r  = CELL / 2 - 5;

            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fillStyle   = color;
            ctx.globalAlpha = 0.85;
            ctx.fill();
            ctx.globalAlpha = 1;

            if (isMe) {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth   = 1.5;
                ctx.stroke();
            }

            // Unit label
            ctx.fillStyle  = '#000';
            ctx.font       = `bold ${r}px Courier New`;
            ctx.textAlign  = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(uid.charAt(1), cx, cy);

            // HP bar
            const hpFrac  = (unit.hp || 0) / (unit.maxHp || MAX_HP);
            const barW    = CELL - 6;
            const barX    = px + 3;
            const barY    = py + 2;
            const barH    = 4;

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(barX, barY, barW, barH);

            ctx.fillStyle = hpFrac > 0.5 ? '#00ff88' : hpFrac > 0.25 ? '#ffee00' : '#ff4444';
            ctx.fillRect(barX, barY, barW * hpFrac, barH);
        }
    }

    // ─── Sidebar ───────────────────────────────────────────────────────
    function updateSidebar(state) {
        const list = document.getElementById('players-list');
        list.innerHTML = '';

        for (const [uid, unit] of Object.entries(state.units || {})) {
            const color   = playerColorMap[unit.playerId] || '#fff';
            const hpFrac  = (unit.hp || 0) / (unit.maxHp || MAX_HP) * 100;
            const isMe    = unit.playerId === myPlayerId;

            list.innerHTML += `
                <div class="player-entry">
                    <div class="player-dot" style="background:${color};box-shadow:0 0 6px ${color}"></div>
                    <div style="flex:1;min-width:0">
                        <div style="font-size:0.72rem;color:${color};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                            ${unit.playerId}${isMe ? ' ★' : ''}
                        </div>
                        <div class="hp-bar-outer">
                            <div class="hp-bar-inner" style="width:${hpFrac}%;background:${color}"></div>
                        </div>
                    </div>
                    <div style="font-size:0.65rem;color:${color}">${unit.hp}/${unit.maxHp}</div>
                </div>`;
        }

        if (Object.keys(state.units || {}).length === 0) {
            list.innerHTML = '<div style="color:#445;font-size:0.75rem">No units</div>';
        }
    }

    // ─── Victory ───────────────────────────────────────────────────────
    function showVictory(winnerId) {
        cancelAnimationFrame(animFrame);
        const overlay = document.getElementById('victory-overlay');
        const text    = document.getElementById('victory-text');
        const isMe    = winnerId === myPlayerId;
        const color   = isMe ? '#00ff88' : '#ff4444';

        text.textContent = isMe ? '★ VICTORY ★' : `${winnerId} WINS`;
        text.style.color = color;
        overlay.classList.add('show');
    }

    // ─── Input ─────────────────────────────────────────────────────────
    window.addEventListener('keydown', (e) => {
        if (!gameState || gameState.status !== 'ACTIVE') return;

        const key = e.key.toLowerCase();

        // Prevent page scroll
        if (['w','a','s','d','i','j','k','l'].includes(key)) e.preventDefault();

        switch (key) {
            case 'w': sendMove(0,  -1); break;
            case 's': sendMove(0,  +1); break;
            case 'a': sendMove(-1,  0); break;
            case 'd': sendMove(+1,  0); break;
            case 'i': sendAttack('UP');    break;
            case 'k': sendAttack('DOWN');  break;
            case 'j': sendAttack('LEFT');  break;
            case 'l': sendAttack('RIGHT'); break;
        }
    });

    async function sendMove(dx, dy) {
        if (!myUnitId || !gameState) return;
        const unit = gameState.units[myUnitId];
        if (!unit) return;

        const nx = Math.max(0, Math.min(19, unit.position.x + dx));
        const ny = Math.max(0, Math.min(19, unit.position.y + dy));
        if (nx === unit.position.x && ny === unit.position.y) return;

        await postCommand({
            actionType: 'MOVE',
            playerId: myPlayerId,
            unitId:   myUnitId,
            matchId:  currentMatchId,
            target:   { x: nx, y: ny }
        });
        fetchAndRender();
    }

    async function sendAttack(direction) {
        if (!myUnitId || !gameState) return;
        const unit = gameState.units[myUnitId];
        if (!unit) return;

        const color = playerColorMap[myPlayerId] || '#ffffff';
        addProjectile(unit.position.x, unit.position.y, direction, color);

        await postCommand({
            actionType: 'ATTACK',
            playerId:  myPlayerId,
            unitId:    myUnitId,
            matchId:   currentMatchId,
            direction
        });
    }

    async function postCommand(payload) {
        try {
            await fetch('/api/v1/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    payload,
                    signature: 'web-mock-signature',
                    timestamp: Math.floor(Date.now() / 1000),
                    nonce: Math.random().toString(36).substring(2)
                })
            });
        } catch (err) {
            console.error('Command error:', err);
        }
    }
    </script>
</body>
</html>
