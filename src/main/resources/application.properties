# Spring Boot Server
server.port=8082

# Kafka Bootstrap Servers
# These addresses match the ports exposed by the kafka brokers in docker-compose.yml
spring.kafka.bootstrap-servers=localhost:29092,localhost:29093,localhost:29094

# Kafka Producer Configuration
# Use JSON serializer for sending our Java objects as JSON
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


# Kafka Consumer Configuration
spring.kafka.consumer.group-id=kafka-wars-engine
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Configure the JsonDeserializer to trust all packages, allowing it to deserialize our custom domain objects.
# The '*' is not recommended for production, but is fine for our current development stage.
spring.kafka.consumer.properties.spring.json.trusted.packages=*
